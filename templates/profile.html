<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trang Cá Nhân | Cộng đồng tự học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css?v={{ asset_version }}">
    <style>
        /* ── Bet cards ─────────────────────────────────────────────── */
        .bet-card { transition: all 0.2s ease; cursor: pointer; }
        .bet-card:hover { transform: translateY(-2px); border-color: rgb(52 211 153 / 0.5); }
        .bet-card.active { border-color: rgb(52 211 153 / 0.7); }
        .detail-panel { animation: slideDown 0.2s ease; overflow: hidden; }
        @keyframes slideDown {
            from { opacity: 0; max-height: 0; }
            to   { opacity: 1; max-height: 300px; }
        }
        .badge-win     { background: rgb(5 46 22);  color: rgb(52 211 153);  border: 1px solid rgb(6 78 59); }
        .badge-lose    { background: rgb(69 10 10); color: rgb(252 165 165); border: 1px solid rgb(127 29 29); }
        .badge-pending { background: rgb(30 27 75); color: rgb(167 139 250); border: 1px solid rgb(67 56 202); }
        .badge-refund  { background: rgb(12 74 110); color: rgb(125 211 252); border: 1px solid rgb(3 105 161); }
        .stat-card { background: rgb(17 24 39); border: 1px solid rgb(55 65 81); border-radius: 0.75rem; padding: 1rem; }

        /* ── Avatar ────────────────────────────────────────────────── */
        .avatar-wrapper { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
        .avatar-img,
        .avatar-initials {
            width: 72px; height: 72px; border-radius: 50%;
            border: 2.5px solid #34d399; object-fit: cover;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 900; color: #fff; letter-spacing: 0.05em;
            user-select: none;
        }
        .avatar-edit-btn {
            position: absolute; bottom: -2px; right: -2px;
            width: 24px; height: 24px; border-radius: 50%;
            background: #111827; border: 2px solid #34d399;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.15s, transform 0.15s;
        }
        .avatar-edit-btn:hover { background: #374151; transform: scale(1.15); }
        .avatar-edit-btn svg { width: 12px; height: 12px; }

        /* ── Modal shared ──────────────────────────────────────────── */
        .modal-backdrop {
            display: none; position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.72); backdrop-filter: blur(5px);
            align-items: center; justify-content: center;
        }
        .modal-backdrop.show { display: flex; }
        .modal-box {
            background: #1f2937; border: 1px solid #374151; border-radius: 1.25rem;
            padding: 1.5rem; width: 90%; max-width: 380px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            animation: modalPop 0.2s ease;
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.92) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ── Avatar modal ──────────────────────────────────────────── */
        #avatar-drop-zone {
            border: 2px dashed #374151; border-radius: 0.875rem;
            padding: 1.75rem 1rem; text-align: center; cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        #avatar-drop-zone.dragover { border-color: #34d399; background: rgba(52,211,153,0.06); }
        #avatar-preview {
            display: none; width: 96px; height: 96px; border-radius: 50%;
            object-fit: cover; margin: 0 auto 0.75rem;
            border: 3px solid #34d399;
        }
        #avatar-preview.show { display: block; }

        /* ── Upload progress ──────────────────────────────────────── */
        .progress-bar-wrap {
            display: none; height: 4px; background: #374151;
            border-radius: 2px; margin-top: 0.75rem; overflow: hidden;
        }
        .progress-bar-wrap.show { display: block; }
        .progress-bar-inner {
            height: 100%; width: 40%;
            background: linear-gradient(90deg, #34d399, #6366f1);
            border-radius: 2px; animation: progressAnim 1.2s ease infinite;
        }
        @keyframes progressAnim { 0% { transform: translateX(-150%); } 100% { transform: translateX(400%); } }

        /* ── Name edit modal ──────────────────────────────────────── */
        .name-input {
            width: 100%; background: #111827; border: 1px solid #374151;
            border-radius: 0.625rem; color: #f9fafb; padding: 0.6rem 0.875rem;
            font-size: 0.95rem; outline: none; transition: border-color 0.15s;
        }
        .name-input:focus { border-color: #34d399; }
        .char-counter { font-size: 0.7rem; color: #6b7280; text-align: right; margin-top: 0.3rem; }
        .char-counter.warn { color: #f87171; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased pb-20">

    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-md">
        <a href="/" class="text-emerald-400 font-black text-xl tracking-wider hover:text-emerald-300 transition-colors">🔥 Đại số</a>
        <div id="user-info" class="text-xs bg-gray-700 px-3 py-1.5 rounded-full border border-gray-600 text-gray-300">
            Đang tải...
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 mt-6">

        <!-- Profile Card -->
        <div class="bg-gradient-to-br from-gray-800 to-gray-900 border border-gray-700 rounded-2xl p-5 mb-6 flex items-center gap-4">

            <!-- Avatar với nút đổi ảnh -->
            <div class="avatar-wrapper">
                <div id="avatar-initials" class="avatar-initials" style="background:#6366f1">??</div>
                <img id="avatar-img" class="avatar-img hidden" src="" alt="Avatar">
                <button class="avatar-edit-btn" id="open-avatar-modal" title="Đổi ảnh đại diện">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828A2 2 0 019 16H7v-2a2 2 0 01.586-1.414z"/>
                    </svg>
                </button>
            </div>

            <!-- Tên + email + nút đổi tên -->
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                    <div id="profile-name" class="font-bold text-white truncate">Đang tải...</div>
                    <button id="open-name-modal" class="flex-shrink-0 text-gray-500 hover:text-emerald-400 transition-colors" title="Đổi tên hiển thị">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828A2 2 0 019 16H7v-2a2 2 0 01.586-1.414z"/>
                        </svg>
                    </button>
                </div>
                <div id="profile-email" class="text-xs text-gray-400 mt-0.5 truncate"></div>
                <div class="text-xs text-gray-500 mt-0.5">Thành viên cộng đồng</div>
            </div>

            <div class="text-right flex-shrink-0">
                <div id="profile-points" class="text-xl font-black text-yellow-400">—</div>
                <div class="text-xs text-gray-500">điểm</div>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="stat-card text-center">
                <div class="text-lg font-black text-white" id="stat-total">—</div>
                <div class="text-xs text-gray-500 mt-0.5">Tổng cược</div>
            </div>
            <div class="stat-card text-center">
                <div class="text-lg font-black text-emerald-400" id="stat-win">—</div>
                <div class="text-xs text-gray-500 mt-0.5">Thắng</div>
            </div>
            <div class="stat-card text-center">
                <div class="text-lg font-black text-red-400" id="stat-lose">—</div>
                <div class="text-xs text-gray-500 mt-0.5">Thua</div>
            </div>
        </div>

        <!-- Bet History -->
        <div class="flex items-center justify-between mb-3">
            <h2 class="text-sm font-bold uppercase tracking-wide text-gray-400">🕘 Lịch Sử Đặt Cược</h2>
            <span class="text-xs text-gray-500">Nhấn để xem chi tiết</span>
        </div>
        <div id="bet-list" class="space-y-3">
            <div class="animate-pulse bg-gray-800 h-20 rounded-xl border border-gray-700"></div>
            <div class="animate-pulse bg-gray-800 h-20 rounded-xl border border-gray-700"></div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 flex justify-around py-2 z-50">
        <a href="/" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-emerald-400 transition-colors px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span class="text-xs">Trang chủ</span>
        </a>
        <a href="/profile" class="flex flex-col items-center gap-0.5 text-emerald-400 px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span class="text-xs font-semibold">Cá nhân</span>
        </a>
    </nav>

    <!-- ══ Modal: Đổi Avatar ══════════════════════════════════════════ -->
    <div id="avatar-modal" class="modal-backdrop" role="dialog" aria-label="Đổi ảnh đại diện">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-white text-base">🖼 Đổi ảnh đại diện</h3>
                <button id="close-avatar-modal" class="text-gray-400 hover:text-white p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <div id="avatar-drop-zone">
                <img id="avatar-preview" src="" alt="Xem trước ảnh">
                <div id="drop-hint">
                    <div class="text-3xl mb-2">📷</div>
                    <div class="text-sm text-gray-300 font-medium">Chọn hoặc kéo thả ảnh vào đây</div>
                    <div class="text-xs text-gray-500 mt-1">JPG · PNG · WebP · GIF &nbsp;·&nbsp; Tối đa 5MB</div>
                </div>
            </div>
            <input type="file" id="avatar-file-input" accept="image/jpeg,image/png,image/webp,image/gif" class="hidden">

            <div class="progress-bar-wrap" id="avatar-progress">
                <div class="progress-bar-inner"></div>
            </div>
            <div id="avatar-error" class="hidden text-red-400 text-xs mt-2 text-center"></div>

            <div class="flex gap-3 mt-4">
                <button id="btn-avatar-cancel" class="flex-1 py-2 rounded-xl border border-gray-600 text-gray-300 text-sm font-medium hover:bg-gray-700 transition-colors">Hủy</button>
                <button id="btn-avatar-save" disabled
                    class="flex-1 py-2 rounded-xl bg-emerald-600 text-white text-sm font-semibold
                           hover:bg-emerald-500 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                    Lưu ảnh
                </button>
            </div>
        </div>
    </div>

    <!-- ══ Modal: Đổi Tên Hiển Thị ═══════════════════════════════════ -->
    <div id="name-modal" class="modal-backdrop" role="dialog" aria-label="Đổi tên hiển thị">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-white text-base">✏️ Đổi tên hiển thị</h3>
                <button id="close-name-modal" class="text-gray-400 hover:text-white p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <label class="block text-sm text-gray-400 mb-1.5">Tên hiển thị</label>
            <input type="text" id="name-input" class="name-input" maxlength="30"
                   placeholder="Nhập tên hiển thị..." autocomplete="off">
            <div class="char-counter"><span id="name-char-count">0</span>/30</div>
            <div id="name-error" class="hidden text-red-400 text-xs mt-2"></div>

            <div class="flex gap-3 mt-4">
                <button id="btn-name-cancel" class="flex-1 py-2 rounded-xl border border-gray-600 text-gray-300 text-sm font-medium hover:bg-gray-700 transition-colors">Hủy</button>
                <button id="btn-name-save"
                    class="flex-1 py-2 rounded-xl bg-indigo-600 text-white text-sm font-semibold
                           hover:bg-indigo-500 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                    Lưu tên
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/profile.js?v={{ asset_version }}"></script>
</body>
</html>
