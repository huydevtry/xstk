<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Quản Lý Trận Đấu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased pb-12">

    <header class="bg-indigo-900 border-b border-indigo-700 sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-black tracking-wider text-indigo-400">⚡ Admin Panel</h1>
        <div id="user-info" class="text-xs bg-indigo-800 px-3 py-1.5 rounded-full border border-indigo-600 text-indigo-300">
            Đang tải...
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-base font-bold uppercase tracking-wide text-gray-400">Danh Sách Trận Đấu</h2>
            <button onclick="syncMatches()" id="sync-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Đồng bộ Sheets
            </button>
        </div>

        <div id="admin-match-list" class="space-y-4">
            <div class="animate-pulse bg-gray-800 h-28 rounded-xl border border-gray-700"></div>
        </div>
    </main>

    <script src="/static/js/admin.js"></script>
</body>
</html>
