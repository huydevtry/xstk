<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Quản Lý Trận Đấu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased pb-12">

    <header class="bg-indigo-900 border-b border-indigo-700 sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-black tracking-wider text-indigo-400">Admin Panel</h1>
        <div id="user-info" class="text-xs bg-indigo-800 px-3 py-1.5 rounded-full border border-indigo-600 text-indigo-300">
            Đang tải...
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 mt-6">
        <section class="bg-gray-800 border border-gray-700 rounded-xl p-4 mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 id="match-form-title" class="text-base font-bold uppercase tracking-wide text-gray-400">Thêm trận đấu</h2>
                <button id="cancel-edit-btn" type="button" onclick="resetMatchForm()" class="hidden text-gray-300 border border-gray-600 hover:bg-gray-700 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors">
                    Hủy sửa
                </button>
            </div>
            <form id="match-form" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input type="hidden" id="match-id">
                <input id="home-team" class="bg-gray-900 border border-gray-700 text-white px-3 py-2 rounded-lg" placeholder="Đội nhà" required maxlength="80">
                <input id="away-team" class="bg-gray-900 border border-gray-700 text-white px-3 py-2 rounded-lg" placeholder="Đội khách" required maxlength="80">
                <input id="home-icon" class="bg-gray-900 border border-gray-700 text-white px-3 py-2 rounded-lg" placeholder="Icon/URL đội nhà">
                <input id="away-icon" class="bg-gray-900 border border-gray-700 text-white px-3 py-2 rounded-lg" placeholder="Icon/URL đội khách">
                <input id="handicap" type="number" step="0.25" value="0" class="bg-gray-900 border border-gray-700 text-white px-3 py-2 rounded-lg" placeholder="Kèo chấp">
                <input id="start-time" type="datetime-local" class="bg-gray-900 border border-gray-700 text-white px-3 py-2 rounded-lg" required>
                <select id="status" class="bg-gray-900 border border-gray-700 text-white px-3 py-2 rounded-lg">
                    <option value="upcoming">upcoming</option>
                    <option value="live">live</option>
                </select>
                <button id="save-match-btn" type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg font-semibold transition-colors">
                    Lưu trận
                </button>
            </form>
        </section>

        <div class="flex items-center justify-between mb-4">
            <h2 class="text-base font-bold uppercase tracking-wide text-gray-400">Danh sách trận đấu</h2>
        </div>

        <div id="admin-match-list" class="space-y-4">
            <div class="animate-pulse bg-gray-800 h-28 rounded-xl border border-gray-700"></div>
        </div>
    </main>

    <script src="/static/js/admin.js"></script>
</body>
</html>
