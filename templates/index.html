<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cộng đồng tự học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased pb-20">

    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 shadow-md">
        <div class="px-4 py-3 flex justify-between items-center">
            <a href="/"><h1 class="text-xl font-black tracking-wider text-emerald-400">🔥 Đại số</h1></a>
            <a href="/profile" id="user-info" class="text-xs bg-gray-700 px-3 py-1.5 rounded-full border border-gray-600 text-gray-300 hover:border-emerald-600 hover:text-emerald-300 transition-colors">
                Đang tải dữ liệu...
            </a>
        </div>
        <!-- Live Ticker -->
        <div class="ticker-wrap">
            <div class="ticker-content" id="ticker-content">
                <span class="text-gray-600 text-xs px-4">⚡ Đang tải hoạt động mới nhất...</span>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 mt-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-base font-bold uppercase tracking-wide text-gray-400">⚽ Trận Đấu Sắp Diễn Ra</h2>
            <span class="text-xs text-emerald-400 bg-emerald-950/50 px-2 py-0.5 rounded border border-emerald-800/50">Live Mode</span>
        </div>

        <div id="match-list" class="space-y-4">
            <div class="animate-pulse bg-gray-800 h-28 rounded-xl border border-gray-700"></div>
            <div class="animate-pulse bg-gray-800 h-28 rounded-xl border border-gray-700"></div>
        </div>

        <!-- Bảng Phong Thần -->
        <div class="leaderboard-section">
            <div class="leaderboard-title">
                <h2 class="text-base font-bold uppercase tracking-wide text-gray-400">🏆 Bảng Phong Thần</h2>
                <button onclick="toggleLeaderboard()" id="lb-toggle-btn"
                    class="text-xs text-emerald-400 bg-emerald-950/50 px-2 py-0.5 rounded border border-emerald-800/50 hover:bg-emerald-900/50 transition-colors">
                    Thu gọn
                </button>
            </div>
            <div id="leaderboard-container">
                <div class="leaderboard-card">
                    <div id="leaderboard-body">
                        <div class="animate-pulse px-3 py-10 text-center text-gray-600 text-xs">Đang tải bảng xếp hạng...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 flex justify-around py-2 z-50">
        <a href="/" class="flex flex-col items-center gap-0.5 text-emerald-400 px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-xs font-semibold">Trang chủ</span>
        </a>
        <a href="/profile" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-emerald-400 transition-colors px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-xs">Cá nhân</span>
        </a>
    </nav>

    <script>
        function toggleLeaderboard() {
            const container = document.getElementById("leaderboard-container");
            const btn = document.getElementById("lb-toggle-btn");
            const isHidden = container.classList.toggle("hidden");
            btn.textContent = isHidden ? "Mở rộng" : "Thu gọn";
        }
    </script>

    <script src="/static/js/app.js"></script>
</body>
</html>
