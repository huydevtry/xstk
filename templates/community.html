<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feed cộng đồng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css?v={{ asset_version }}">
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased pb-24">
    <header class="sticky top-0 z-50 border-b border-slate-200/80 bg-white/88 backdrop-blur shadow-sm">
        <div class="px-3 py-3 sm:px-4 sm:py-3 flex flex-wrap items-start justify-between gap-2 sm:items-center">
            <a href="/community" class="min-w-0 flex-1 sm:flex-none">
                <h1 class="truncate text-lg font-black tracking-[0.18em] text-sky-600 sm:text-xl">Khóa Tu Mùa Hè</h1>
            </a>
            <a href="/profile" id="user-info" class="max-w-full text-xs bg-white/95 px-3 py-1.5 rounded-full border border-slate-200 text-slate-700 hover:border-sky-300 hover:text-sky-800 transition-colors shadow-sm">
                Đang tải dữ liệu...
            </a>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-3 sm:px-4 mt-4 sm:mt-6">
        <section class="mb-4 rounded-3xl border border-slate-200 bg-white px-4 py-4 shadow-sm">
            <div class="text-[11px] font-bold uppercase tracking-[0.22em] text-sky-600">Feed</div>
            <h2 class="mt-2 text-lg font-black text-slate-900">Lưu bút ngày xanh</h2>
            <p class="mt-1 text-sm leading-6 text-slate-500">Mỗi dòng trạng thái là một khoảnh khắc trưởng thành...</p>
        </section>

        <div id="community-error" class="hidden mb-3 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700"></div>
        <div id="community-empty" class="rounded-3xl border border-dashed border-slate-200 bg-white/80 px-4 py-8 text-center text-sm text-slate-500 shadow-sm">
            Chưa có bài chia sẻ nào trong cộng đồng.
        </div>
        <div id="community-timeline" class="space-y-4"></div>

        <div class="mt-5 mb-24 flex justify-center">
            <button
                id="community-load-more"
                type="button"
                class="hidden rounded-full border border-sky-200 bg-sky-50 px-4 py-2 text-sm font-semibold text-sky-700 transition hover:bg-sky-100"
            >
                Xem thêm
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/92 backdrop-blur border-t border-slate-200 flex justify-around py-2 z-50 shadow-[0_-8px_24px_rgba(15,23,42,0.05)]">
        <a href="/community" class="flex flex-col items-center gap-0.5 text-sky-600 px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5V4H2v16h5m10 0v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6m10 0H7"/>
            </svg>
            <span class="text-xs font-semibold">Feed</span>
        </a>
        <a href="/" class="flex flex-col items-center gap-0.5 text-slate-500 hover:text-sky-600 transition-colors px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span class="text-xs">Trang chủ</span>
        </a>
        <a href="/profile" class="flex flex-col items-center gap-0.5 text-slate-500 hover:text-sky-600 transition-colors px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span class="text-xs">Cá nhân</span>
        </a>
    </nav>

    <div id="match-detail-modal" class="hidden fixed inset-0 z-[60] bg-slate-950/50 backdrop-blur-sm overflow-y-auto">
        <div class="min-h-full px-4 py-4 flex items-start justify-center">
            <div class="w-full max-w-5xl rounded-2xl border border-slate-200 bg-white shadow-2xl overflow-hidden">
                <div class="flex items-start justify-between gap-3 px-4 py-4 border-b border-slate-200">
                    <div class="min-w-0">
                        <div class="text-[11px] uppercase tracking-[0.18em] text-slate-500">Chi tiết trận đấu</div>
                        <div id="match-detail-title" class="mt-1 text-lg md:text-xl font-black text-slate-900 truncate"></div>
                        <div id="match-detail-subtitle" class="mt-1 text-xs md:text-sm text-slate-500"></div>
                    </div>
                    <button type="button" onclick="closeMatchDetail()" class="text-slate-400 hover:text-slate-900 p-2 rounded-full hover:bg-slate-100 transition-colors" title="Đóng">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="px-4 py-4 space-y-4">
                    <div id="match-detail-quote" class="rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-amber-900 italic"></div>
                    <div id="match-detail-body" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/timeline.js?v={{ asset_version }}"></script>
    <script src="/static/js/match-detail.js?v={{ asset_version }}"></script>
    <script src="/static/js/community.js?v={{ asset_version }}"></script>
</body>
</html>
