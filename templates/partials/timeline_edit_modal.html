<div id="timeline-edit-modal" class="hidden fixed inset-0 z-[80] bg-slate-950/50 backdrop-blur-sm overflow-y-auto">
    <div class="min-h-full px-4 py-4 flex items-start justify-center">
        <div class="w-full max-w-xl rounded-3xl border border-slate-200 bg-white shadow-2xl overflow-hidden">
            <div class="flex items-start justify-between gap-3 border-b border-slate-200 px-4 py-4">
                <div class="min-w-0">
                    <div class="text-[11px] font-bold uppercase tracking-[0.24em] text-slate-500">Bài viết</div>
                    <div class="mt-1 text-base font-semibold text-slate-900">Chỉnh sửa bài viết</div>
                </div>
                <button id="close-timeline-edit" type="button" class="rounded-full p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-900" title="Đóng">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="px-4 py-4">
                <textarea
                    id="timeline-edit-content"
                    rows="4"
                    maxlength="160"
                    class="min-h-[110px] w-full resize-none rounded-2xl border border-slate-200 bg-white px-3 py-3 text-sm leading-6 text-slate-800 outline-none transition focus:border-sky-300"
                    placeholder="Bạn đang nghĩ gì?"
                ></textarea>
                <div class="mt-1 text-right text-xs font-semibold text-slate-400"><span id="timeline-edit-count">0</span>/160</div>

                <div id="timeline-edit-media-preview-wrap" class="group relative hidden mt-3 overflow-hidden rounded-2xl border border-slate-200 bg-slate-50">
                    <img id="timeline-edit-media-preview" src="" alt="Media bài viết" class="max-h-72 w-full object-contain">
                </div>
                <div id="timeline-edit-error" class="hidden mt-3 text-xs font-medium text-rose-600"></div>

                <div class="mt-4 flex flex-wrap items-center justify-between gap-3 border-t border-slate-100 pt-3">
                    <div class="flex items-center gap-1">
                        <input id="timeline-edit-media-input" type="file" accept="image/jpeg,image/png,image/webp" class="hidden">
                        <button id="choose-timeline-edit-media" type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-full text-slate-500 transition hover:bg-sky-50 hover:text-sky-600" aria-label="Chọn ảnh" title="Chọn ảnh">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2 1.586-1.586a2 2 0 012.828 0L20 14m-9-8h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </button>
                        <button id="open-timeline-edit-giphy" type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-full text-slate-500 transition hover:bg-emerald-50 hover:text-emerald-600" aria-label="Chọn GIF" title="Chọn GIF">
                            <span class="text-[11px] font-black tracking-wide">GIF</span>
                        </button>
                        <button id="remove-timeline-edit-media" type="button" class="hidden rounded-full border border-rose-200 bg-rose-50 px-3 py-2 text-xs font-semibold text-rose-700 transition hover:bg-rose-100">
                            Xóa media
                        </button>
                        <button id="clear-timeline-edit-media" type="button" class="hidden rounded-full border border-slate-200 bg-white px-3 py-2 text-xs font-semibold text-slate-600 transition hover:bg-slate-50">
                            Hoàn tác media
                        </button>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="timeline-edit-cancel" type="button" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-50">
                            Hủy
                        </button>
                        <button id="timeline-edit-save" type="button" class="rounded-full bg-sky-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-sky-500 disabled:cursor-not-allowed disabled:opacity-50">
                            Lưu
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="timeline-edit-giphy-modal" class="app-modal-overlay hidden z-[90] bg-slate-950/50 backdrop-blur-sm">
    <div class="app-modal-shell">
        <div class="app-modal-panel max-w-3xl rounded-3xl border border-slate-200 bg-white shadow-2xl">
            <div class="flex flex-shrink-0 items-start justify-between gap-3 border-b border-slate-200 px-4 py-4">
                <div class="min-w-0">
                    <div class="text-[11px] font-bold uppercase tracking-[0.24em] text-slate-500">GIPHY</div>
                    <div class="mt-1 text-base font-semibold text-slate-900">Chọn GIF cho bài viết</div>
                </div>
                <button id="close-timeline-edit-giphy" type="button" class="rounded-full p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-900">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="flex min-h-0 flex-1 flex-col space-y-4 px-4 py-4">
                <div class="flex flex-shrink-0 flex-col gap-3 sm:flex-row">
                    <input id="timeline-edit-giphy-search-input" type="text" placeholder="Tìm GIF cảm xúc, reaction, meme..." class="min-w-0 flex-1 rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-900 outline-none transition focus:border-sky-300 focus:bg-white">
                    <button id="timeline-edit-giphy-search-button" type="button" class="rounded-2xl bg-sky-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-sky-500">
                        Tìm
                    </button>
                </div>
                <div id="timeline-edit-giphy-status" class="flex-shrink-0 text-xs text-slate-500">Chọn từ thư viện GIF của GIPHY.</div>
                <div id="timeline-edit-giphy-results" class="app-modal-scroll min-h-0 flex-1 pr-1">
                    <div class="grid grid-cols-2 gap-3 sm:grid-cols-3"></div>
                </div>
                <div class="flex-shrink-0 border-t border-slate-200 pt-3 text-center text-xs text-slate-400">
                    Powered by <a href="https://giphy.com/" target="_blank" rel="noreferrer" class="font-semibold text-slate-500 hover:text-slate-700">GIPHY</a>
                </div>
            </div>
        </div>
    </div>
</div>
