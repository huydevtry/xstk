<div class="relative max-w-full" data-user-menu>
    <button id="user-info" type="button" data-user-menu-trigger aria-haspopup="menu" aria-expanded="false" class="{{ user_info_button_class }}">
        Đang tải dữ liệu...
    </button>
    <div data-user-menu-panel class="{{ user_menu_panel_class }}">
        <a href="/profile" class="user-menu-item block rounded-2xl px-3 py-2.5 text-sm font-semibold text-slate-700 transition">Xem trang cá nhân</a>
        <!-- Push notification toggle -->
        <button
            id="push-toggle-btn"
            type="button"
            class="user-menu-item mt-2 w-full flex items-center justify-between rounded-2xl px-3 py-2.5 text-sm font-semibold text-slate-700 transition"
        >
            <span class="flex items-center gap-2">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" class="opacity-60">
                    <path d="M12 2a7 7 0 0 0-7 7c0 5.25-2.5 7.5-2.5 7.5h19S19 14.25 19 9a7 7 0 0 0-7-7z"/>
                    <path d="M10.3 21a2 2 0 0 0 3.4 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                </svg>
                Thông báo
            </span>
            <span id="push-toggle-label" class="push-toggle-pill">...</span>
        </button>
        {% if viewer_is_admin %}
        <a href="/admin" class="user-menu-item mt-2 block rounded-2xl px-3 py-2.5 text-sm font-semibold text-sky-800 transition">Trang admin</a>
        {% endif %}
        {% if logout_url %}
        <a href="{{ logout_url }}" class="user-menu-item user-menu-item-danger mt-2 block rounded-2xl px-3 py-2.5 text-sm font-semibold transition">Đăng xuất</a>
        {% endif %}
    </div>
</div>
