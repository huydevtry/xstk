<header class="{{ header_root_class }}">
    <div class="{{ header_row_class }}">
        <a href="{{ header_title_href }}" class="{{ header_title_link_class }}">
            <h1 class="{{ header_title_class }}">{{ header_title }}</h1>
        </a>
        {% if show_user_menu %}
        <div class="{{ header_actions_class }}">
            <button
                id="push-toggle-btn"
                type="button"
                title="Bật thông báo"
                aria-label="Bật/tắt thông báo"
                class="push-bell-btn flex-shrink-0 w-9 h-9 flex items-center justify-center rounded-full border border-slate-200 bg-white/95 text-slate-400 hover:border-sky-300 hover:text-sky-600 transition-colors shadow-sm"
            >
                <svg id="push-bell-svg" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    <line id="push-bell-slash" x1="2" y1="2" x2="22" y2="22" stroke-dasharray="0"/>
                </svg>
            </button>
            {% include "partials/user_menu.html" %}
        </div>
        {% elif header_action_href and header_action_label %}
        <a href="{{ header_action_href }}" class="{{ header_action_class }}">
            {{ header_action_label }}
        </a>
        {% endif %}
    </div>
    {% if show_ticker %}
    <div class="ticker-wrap">
        <div class="ticker-content" id="ticker-content">
            <span class="text-gray-600 text-xs px-4">⚡ Đang tải hoạt động mới nhất...</span>
        </div>
    </div>
    {% endif %}
</header>
