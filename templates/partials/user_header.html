<header class="{{ header_root_class }}">
    <div class="{{ header_row_class }}">
        <a href="{{ header_title_href }}" class="{{ header_title_link_class }}">
            <h1 class="{{ header_title_class }}">{{ header_title }}</h1>
        </a>
        {% if show_user_menu %}
        <div class="{{ header_actions_class }}">
            <!-- Notification Inbox Bell -->
            <div class="relative flex-shrink-0" id="notif-wrap">
                <button
                    id="notif-bell-btn"
                    type="button"
                    aria-label="Danh sách thông báo"
                    title="Thông báo"
                    class="push-bell-btn w-9 h-9 flex items-center justify-center rounded-full"
                >
                    <!-- Bell icon — SF Symbols style, solid fill -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M12 2a7 7 0 0 0-7 7c0 5.25-2.5 7.5-2.5 7.5h19S19 14.25 19 9a7 7 0 0 0-7-7z"/>
                        <path d="M10.3 21a2 2 0 0 0 3.4 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                    </svg>
                    <!-- Unread badge -->
                    <span id="notif-badge" class="notif-badge hidden"></span>
                </button>

                <!-- Dropdown inbox panel -->
                <div id="notif-panel" class="notif-panel hidden">
                    <div class="notif-panel-header">
                        <span class="text-xs font-semibold text-slate-600 tracking-wide">Thông báo</span>
                        <button id="notif-read-all" class="text-xs text-sky-500 font-medium hover:text-sky-700 transition-colors">Đánh dấu đã đọc</button>
                    </div>
                    <div id="notif-list" class="notif-list">
                        <p class="notif-empty">Chưa có thông báo</p>
                    </div>
                </div>
            </div>
            {% include "partials/user_menu.html" %}
        </div>
        {% elif header_action_href and header_action_label %}
        <a href="{{ header_action_href }}" class="{{ header_action_class }}">
            {{ header_action_label }}
        </a>
        {% endif %}
    </div>
    {% if show_ticker %}
    <div class="ticker-wrap">
        <div class="ticker-content" id="ticker-content">
            <span class="text-gray-600 text-xs px-4">⚡ Đang tải hoạt động mới nhất...</span>
        </div>
    </div>
    {% endif %}
</header>
