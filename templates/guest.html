<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đang chờ phê duyệt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css?v={{ asset_version }}">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <main class="mx-auto flex min-h-screen max-w-3xl items-center px-4 py-10">
        <section class="w-full overflow-hidden rounded-[2rem] border border-amber-400/20 bg-slate-900/90 shadow-2xl shadow-slate-950/60">
            <div class="bg-gradient-to-r from-amber-500/15 via-sky-500/10 to-emerald-500/15 px-6 py-5">
                <div class="text-[11px] font-bold uppercase tracking-[0.28em] text-amber-300">Guest Space</div>
                <h1 class="mt-3 text-3xl font-black text-white sm:text-4xl">Tài khoản đang chờ phê duyệt</h1>
                <p class="mt-3 max-w-2xl text-sm leading-7 text-slate-300 sm:text-base">
                    Hệ thống đã ghi nhận đăng nhập của bạn. Admin sẽ phê duyệt tài khoản trước khi bạn vào được trang chủ.
                </p>
            </div>
            <div class="space-y-5 px-6 py-6 sm:px-8 sm:py-8">
                {% if pending_email %}
                <div class="rounded-3xl border border-slate-800 bg-slate-950/70 p-5">
                    <div class="text-xs uppercase tracking-[0.2em] text-slate-400">Tài khoản</div>
                    <div class="mt-3 text-lg font-bold text-white">{{ pending_display_name }}</div>
                    <div class="mt-1 break-all text-sm text-slate-400">{{ pending_email }}</div>
                </div>
                {% endif %}
 <div class="flex flex-wrap gap-3">
                    <a href="/guest" class="inline-flex items-center justify-center rounded-2xl border border-slate-700 bg-slate-950 px-4 py-2.5 text-sm font-semibold text-slate-200 transition hover:border-slate-500 hover:text-white">
                        Làm mới trạng thái
                    </a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
