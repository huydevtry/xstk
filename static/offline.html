<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Không có kết nối — Khóa Tu Mùa Hè</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 40%, #f8fafc 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #1e293b;
      padding: 1.5rem;
    }

    .card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(14,165,233,0.15);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(15,23,42,0.08), 0 4px 16px rgba(14,165,233,0.06);
    }

    .icon-wrapper {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      border-radius: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 8px 24px rgba(14,165,233,0.3);
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.9rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: white;
      border: none;
      border-radius: 0.875rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      text-decoration: none;
    }

    .retry-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .retry-btn:active { transform: translateY(0); }

    .hint {
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrapper">📡</div>
    <h1>Không có kết nối</h1>
    <p>Bạn đang ở chế độ offline. Kiểm tra Wi-Fi hoặc dữ liệu di động rồi thử lại.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      🔄 Thử lại
    </button>
    <p class="hint">Dữ liệu sẽ được đồng bộ khi có mạng trở lại</p>
  </div>
</body>
</html>
